name: monorepo-ci

on:
  push:
    branches: [main, "feat/**"]
  pull_request:

jobs:
  brain:
    name: rust brain (cargo)
    runs-on: macos-14
    steps:
      # actions pinned by commit SHA per repo security policy
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable, resolved 2026-07-19
      - name: fmt (mycel crates only, sentinel submodule excluded)
        run: cargo fmt -p mycel-core -p mycel-mcp -p mycel-cli -p mycel-gate --check
      - name: clippy
        run: cargo clippy --workspace --exclude sentinel-guard -- -D warnings
      - name: test
        run: cargo test --workspace
      - name: gate contract e2e (deterministic, no model)
        run: bash tests/e2e/gate-contract.sh
      - name: immunity loop e2e (m2: capture -> ingest -> promote -> block)
        run: bash tests/e2e/immunity-loop.sh

  body:
    name: ts harness (pnpm)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10.33.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "24.15.0"
          cache: pnpm
          cache-dependency-path: harness/pnpm-lock.yaml
      - name: install
        run: pnpm install --frozen-lockfile
        working-directory: harness
      - name: agent-core hook/config/plugin suites
        run: pnpm vitest run test/hooks test/config test/plugin
        working-directory: harness/packages/agent-core
      - name: agent-core-v2 hook/config/plugin suites
        run: pnpm vitest run test/agent/externalHooks test/app/externalHooksRunner test/app/plugin
        working-directory: harness/packages/agent-core-v2
      - name: app suite
        run: pnpm vitest run
        working-directory: harness/apps/mycel
      - name: build
        run: pnpm run build:packages && pnpm -C apps/mycel run build
        working-directory: harness
      # NOT run in CI (documented, not silenced): full-monorepo suites carry
      # upstream-inherited env-dependent flakes (google-genai vertex test with
      # ambient credentials, image/sharp timing under parallel load, one loop
      # snapshot). the targeted suites above are the load-bearing ones for
      # mycel's gate + config + plugin surface and are deterministic.
